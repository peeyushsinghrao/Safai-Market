openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Safai Market — Anupurna Traders store management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: categories
    description: Product categories
  - name: products
    description: Product inventory management
  - name: bills
    description: Billing and POS operations
  - name: customers
    description: Customer management and udhaar
  - name: suppliers
    description: Supplier management
  - name: purchases
    description: Purchase entry and restocking
  - name: stockMovements
    description: Stock movement history
  - name: expenses
    description: Expense tracking
  - name: dailyClosings
    description: Daily closing management
  - name: dashboard
    description: Dashboard and summary data

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── PROFIT ──────────────────────────────────────────────────────────────────
  /profit/summary:
    get:
      operationId: getProfitSummary
      tags: [dashboard]
      summary: Get profit summary for a date range
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Profit summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfitSummary"

  /profit/daily:
    get:
      operationId: getProfitDaily
      tags: [dashboard]
      summary: Get daily profit trend
      parameters:
        - name: days
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Daily profit data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyProfitEntry"

  /profit/by-product:
    get:
      operationId: getProfitByProduct
      tags: [dashboard]
      summary: Get profit breakdown by product
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Product profit data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductProfitEntry"

  /profit/by-category:
    get:
      operationId: getProfitByCategory
      tags: [dashboard]
      summary: Get profit breakdown by category
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Category profit data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryProfitEntry"

  # ─── DASHBOARD ───────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get today's sales summary and business overview
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/low-stock:
    get:
      operationId: getLowStockProducts
      tags: [dashboard]
      summary: Get products at or below low stock limit
      responses:
        "200":
          description: Low stock products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LowStockProduct"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"

  # ─── CATEGORIES ──────────────────────────────────────────────────────────────
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a new category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  # ─── PRODUCTS ─────────────────────────────────────────────────────────────────
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products with optional filters
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived]
        - name: lowStockOnly
          in: query
          schema:
            type: boolean
        - name: outOfStockOnly
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID with full details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update product details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found

  /products/{id}/archive:
    post:
      operationId: archiveProduct
      tags: [products]
      summary: Archive a product (soft delete)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Archived product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}/stock-movements:
    get:
      operationId: getProductStockMovements
      tags: [products]
      summary: Get stock movement history for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stock movements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockMovement"

  # ─── BILLS ───────────────────────────────────────────────────────────────────
  /bills:
    get:
      operationId: listBills
      tags: [bills]
      summary: List bills with optional filters
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, cancelled]
        - name: customerId
          in: query
          schema:
            type: integer
        - name: dateFrom
          in: query
          schema:
            type: string
        - name: dateTo
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of bills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bill"
    post:
      operationId: createBill
      tags: [bills]
      summary: Create a new bill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillInput"
      responses:
        "201":
          description: Created bill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"
        "400":
          description: Validation error (e.g. insufficient stock)

  /bills/{id}:
    get:
      operationId: getBill
      tags: [bills]
      summary: Get bill details with line items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bill with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillDetail"
        "404":
          description: Not found

  /bills/{id}/cancel:
    post:
      operationId: cancelBill
      tags: [bills]
      summary: Cancel a bill (reverses stock movements)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelBillInput"
      responses:
        "200":
          description: Cancelled bill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"

  # ─── CUSTOMERS ───────────────────────────────────────────────────────────────
  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: hasUdhaar
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a new customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Created customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get customer with udhaar ledger
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer with ledger
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDetail"
        "404":
          description: Not found
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update customer details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}/payments:
    post:
      operationId: receiveCustomerPayment
      tags: [customers]
      summary: Record a payment received from a customer (reduces udhaar)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UdhaarPaymentInput"
      responses:
        "201":
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UdhaarLedgerEntry"

  # ─── SUPPLIERS ───────────────────────────────────────────────────────────────
  /suppliers:
    get:
      operationId: listSuppliers
      tags: [suppliers]
      summary: List all suppliers
      responses:
        "200":
          description: List of suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"
    post:
      operationId: createSupplier
      tags: [suppliers]
      summary: Create a new supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierInput"
      responses:
        "201":
          description: Created supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /suppliers/{id}:
    get:
      operationId: getSupplier
      tags: [suppliers]
      summary: Get supplier details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supplier details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
        "404":
          description: Not found
    patch:
      operationId: updateSupplier
      tags: [suppliers]
      summary: Update supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierUpdate"
      responses:
        "200":
          description: Updated supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /suppliers/{id}/payments:
    post:
      operationId: makeSupplierPayment
      tags: [suppliers]
      summary: Record a payment made to a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierPaymentInput"
      responses:
        "201":
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierLedgerEntry"

  # ─── PURCHASES ───────────────────────────────────────────────────────────────
  /purchases:
    get:
      operationId: listPurchases
      tags: [purchases]
      summary: List purchase entries
      parameters:
        - name: supplierId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of purchases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Purchase"
    post:
      operationId: createPurchase
      tags: [purchases]
      summary: Create a purchase entry (increases stock)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseInput"
      responses:
        "201":
          description: Created purchase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Purchase"

  /purchases/{id}:
    get:
      operationId: getPurchase
      tags: [purchases]
      summary: Get purchase details with line items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Purchase detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseDetail"
        "404":
          description: Not found

  # ─── STOCK MOVEMENTS ─────────────────────────────────────────────────────────
  /stock-movements:
    get:
      operationId: listStockMovements
      tags: [stockMovements]
      summary: List stock movements (all products or filtered)
      parameters:
        - name: productId
          in: query
          schema:
            type: integer
        - name: movementType
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of stock movements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockMovement"
    post:
      operationId: createStockAdjustment
      tags: [stockMovements]
      summary: Create a manual stock adjustment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockAdjustmentInput"
      responses:
        "201":
          description: Created stock adjustment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockMovement"

  # ─── EXPENSES ─────────────────────────────────────────────────────────────────
  /expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      summary: List expenses
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: string
        - name: dateTo
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expense"
    post:
      operationId: createExpense
      tags: [expenses]
      summary: Record a new expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseInput"
      responses:
        "201":
          description: Created expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"

  /expenses/{id}:
    delete:
      operationId: deleteExpense
      tags: [expenses]
      summary: Delete an expense entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── DAILY CLOSINGS ───────────────────────────────────────────────────────────
  /daily-closings:
    get:
      operationId: listDailyClosings
      tags: [dailyClosings]
      summary: List daily closing records
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of daily closings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyClosing"
    post:
      operationId: createDailyClosing
      tags: [dailyClosings]
      summary: Submit daily closing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailyClosingInput"
      responses:
        "201":
          description: Daily closing submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyClosing"

  /daily-closings/today:
    get:
      operationId: getTodayClosing
      tags: [dailyClosings]
      summary: Get today's closing data (computed from current day's transactions)
      responses:
        "200":
          description: Today's closing summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodayClosingSummary"

components:
  schemas:
    ProfitSummary:
      type: object
      required: [totalSales, totalProfit, billCount, billsWithProfit, avgMarginPct]
      properties:
        totalSales:
          type: number
        totalProfit:
          type: number
        billCount:
          type: integer
        billsWithProfit:
          type: integer
        avgMarginPct:
          type: number

    DailyProfitEntry:
      type: object
      required: [date, sales, profit, billCount]
      properties:
        date:
          type: string
        sales:
          type: number
        profit:
          type: number
        billCount:
          type: integer

    ProductProfitEntry:
      type: object
      required: [productId, productName, quantitySold, revenue, profit, marginPct, hasProfit]
      properties:
        productId:
          type: integer
        productName:
          type: string
        quantitySold:
          type: number
        revenue:
          type: number
        profit:
          type: number
        marginPct:
          type: number
        hasProfit:
          type: boolean

    CategoryProfitEntry:
      type: object
      required: [category, revenue, profit, marginPct]
      properties:
        category:
          type: string
        revenue:
          type: number
        profit:
          type: number
        marginPct:
          type: number

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ─── DASHBOARD ────────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required:
        - todayTotalSales
        - todayBillCount
        - todayCashReceived
        - todayUpiReceived
        - todayUdhaarGiven
        - totalOutstandingUdhaar
        - totalSupplierPending
        - pendingClosingDate
        - lowStockCount
        - todayExpenses
      properties:
        todayTotalSales:
          type: number
        todayBillCount:
          type: integer
        todayCashReceived:
          type: number
        todayUpiReceived:
          type: number
        todayUdhaarGiven:
          type: number
        todayExpenses:
          type: number
        totalOutstandingUdhaar:
          type: number
        totalSupplierPending:
          type: number
        lowStockCount:
          type: integer
        pendingClosingDate:
          type: ["string", "null"]

    LowStockProduct:
      type: object
      required: [id, name, currentStock, lowStockLimit, unit]
      properties:
        id:
          type: integer
        name:
          type: string
        brand:
          type: ["string", "null"]
        currentStock:
          type: number
        lowStockLimit:
          type: number
        unit:
          type: string

    ActivityEvent:
      type: object
      required: [id, eventType, description, amount, createdAt]
      properties:
        id:
          type: integer
        eventType:
          type: string
          enum: [bill_created, bill_cancelled, payment_received, purchase_created, expense_recorded, stock_adjusted]
        description:
          type: string
        amount:
          type: ["number", "null"]
        createdAt:
          type: string

    # ─── CATEGORY ─────────────────────────────────────────────────────────────
    Category:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        subcategories:
          type: array
          items:
            type: string

    CategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        subcategories:
          type: array
          items:
            type: string

    # ─── PRODUCT ──────────────────────────────────────────────────────────────
    Product:
      type: object
      required: [id, name, currentStock, sellPrice, buyPrice, unit, status, categoryId]
      properties:
        id:
          type: integer
        skuCode:
          type: ["string", "null"]
        name:
          type: string
        displayName:
          type: ["string", "null"]
        brand:
          type: ["string", "null"]
        categoryId:
          type: integer
        categoryName:
          type: ["string", "null"]
        subcategory:
          type: ["string", "null"]
        unit:
          type: string
        buyPrice:
          type: number
        sellPrice:
          type: number
        wholesalePrice:
          type: ["number", "null"]
        mrp:
          type: ["number", "null"]
        currentStock:
          type: number
        lowStockLimit:
          type: number
        reorderQuantity:
          type: ["number", "null"]
        primarySupplierId:
          type: ["integer", "null"]
        hinglishAliases:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, archived]
        isVariantParent:
          type: boolean
        parentProductId:
          type: ["integer", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    ProductInput:
      type: object
      required: [name, categoryId, unit, buyPrice, sellPrice]
      properties:
        name:
          type: string
        displayName:
          type: string
        brand:
          type: string
        categoryId:
          type: integer
        subcategory:
          type: string
        unit:
          type: string
        buyPrice:
          type: number
        sellPrice:
          type: number
        wholesalePrice:
          type: number
        mrp:
          type: number
        initialStock:
          type: number
        lowStockLimit:
          type: number
